name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: danielhinsching
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake-custom.svg?color_snake=00d4ff&color_dots[0]=0a0f1e&color_dots[1]=0d2137&color_dots[2]=0a5c8a&color_dots[3]=0088cc&color_dots[4]=00d4ff
      - uses: crazy-max/ghaction-github-pages@v3
        with:
